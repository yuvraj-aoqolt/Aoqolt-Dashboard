<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FHV7B3SRMH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FHV7B3SRMH');
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/32.png?v=1">
    <link rel="icon" type="image/png" sizes="16x16" href="/16.png?v=1">
    <link rel="icon" href="/favicon.ico?v=1">
    <link rel="apple-touch-icon" sizes="180x180" href="/180.png?v=1">
    <!-- <link rel="icon" type="image/x-icon" href="/favicon.ico" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Aoqolt</title>
    <meta name="description" content="Discover your energy field. Professional aura readings, family dynamic analysis, and astrology sessions that illuminate your path, heal your energy, and connect you to your higher purpose." />
    <!-- Preconnect to font CDNs as early as possible -->

    <!-- Local Satoshi font — only 2 critical weights preloaded -->
    <link rel="preload" href="/fonts/Satoshi-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Satoshi-Bold.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Preload hero logo so it renders immediately with the page -->
    <link rel="preload" href="/Aoqolt logo 1-01-02.png" as="image" />

    <!-- Inline critical styles: prevents FOUC and shows a spinner before React loads -->
    <style>
      body { margin: 0; background: #0a0a0a; }
      #app-loading {
        position: fixed; inset: 0; background: #0a0a0a;
        display: flex; align-items: center; justify-content: center; z-index: 9999;
      }
      #app-loading-spinner {
        width: 48px; height: 48px;
        border: 3px solid #222;
        border-top-color: #dc2626;
        border-radius: 50%;
        animation: _spin 0.9s linear infinite;
      }
      @keyframes _spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Visible immediately — replaced once React mounts -->
    <div id="app-loading" aria-hidden="true">
      <div id="app-loading-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
