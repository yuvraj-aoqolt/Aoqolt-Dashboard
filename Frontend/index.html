<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Aoqolt — Spiritual Services</title>

    <!-- Preconnect to font CDNs as early as possible -->

    <!-- Local Satoshi font — served from /fonts/ -->
    <!-- (No CDN needed; preloading critical weights for fast first paint) -->
    <link rel="preload" href="/fonts/Satoshi-Regular.otf" as="font" type="font/otf" crossorigin />
    <link rel="preload" href="/fonts/Satoshi-Medium.otf" as="font" type="font/otf" crossorigin />
    <link rel="preload" href="/fonts/Satoshi-Bold.otf" as="font" type="font/otf" crossorigin />

    <!-- Preload hero logo so it renders immediately with the page -->
    <link rel="preload" href="/Aoqolt logo 1-01-02.png" as="image" />

    <!-- Apple Sign In SDK — deferred so it never blocks page rendering -->
    <script defer src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>

    <!-- Inline critical styles: prevents FOUC and shows a spinner before React loads -->
    <style>
      body { margin: 0; background: #0a0a0a; }
      #app-loading {
        position: fixed; inset: 0; background: #0a0a0a;
        display: flex; align-items: center; justify-content: center; z-index: 9999;
      }
      #app-loading-spinner {
        width: 48px; height: 48px;
        border: 3px solid #222;
        border-top-color: #dc2626;
        border-radius: 50%;
        animation: _spin 0.9s linear infinite;
      }
      @keyframes _spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Visible immediately — replaced once React mounts -->
    <div id="app-loading" aria-hidden="true">
      <div id="app-loading-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
